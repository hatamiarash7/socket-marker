name: CI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Install dependencies
              run: sudo apt-get install -y gcc

            - name: Build library
              run: make

            - name: Build test binary
              run: make test-bin

            - name: Run tests
              run: sudo make test
